<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Manager</title>

<style>

body{
font-family: Arial;
background: #f4f6f8;
text-align: center;
margin-top: 50px;
}

.container{
background: white;
width: 400px;
margin: auto;
padding: 20px;
border-radius: 10px;
box-shadow: 0 0 10px gray;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
}

li{
list-style:none;
background:#eee;
margin:10px;
padding:10px;
border-radius:5px;
}

.completed{
text-decoration: line-through;
color: gray;
}

</style>

</head>

<body>

<div class="container">

<h2>My Task Manager</h2>

<input id="taskInput" placeholder="Enter task">

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
